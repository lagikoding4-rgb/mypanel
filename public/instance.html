<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instance</title>
<link rel="stylesheet" href="style.css" />
<style>
  .server-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px;
  }
  .server-header h1 { margin: 0; font-size: 1.4rem; }
  .server-sub { color: #8b949e; font-size: 13px; margin-bottom: 16px; }

  .tab-bar {
    display: flex; gap: 4px; border-bottom: 1px solid #30363d;
    margin-bottom: 18px; overflow-x: auto;
  }
  .tab-btn {
    background: none; border: none; color: #8b949e; padding: 10px 16px;
    font-weight: 600; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Files tab (reuse styling) */
  .fm-toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .fm-toolbar button, .fm-toolbar label {
    background: #21262d; color: #e6edf3; border: 1px solid #30363d;
    padding: 9px 14px; border-radius: 8px; font-weight: 600; cursor: pointer;
    font-size: 14px; display: inline-block;
  }
  .fm-toolbar input[type=file] { display: none; }
  .breadcrumb { margin-bottom: 12px; color: #8b949e; }
  .breadcrumb a { color: #58a6ff; cursor: pointer; }
  .fm-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-bottom: 1px solid #30363d;
  }
  .fm-row input[type=checkbox] { flex-shrink: 0; }
  .fm-name { flex: 1; cursor: pointer; overflow-wrap: anywhere; }
  .fm-name.folder { color: #58a6ff; font-weight: 600; }
  .fm-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .fm-actions button {
    background: none; border: none; color: #8b949e; font-size: 13px;
    cursor: pointer; padding: 4px 6px;
  }
  .fm-actions button:hover { color: #e6edf3; }
  .selected-bar {
    display: none; background: #1f6feb22; border: 1px solid #1f6feb;
    padding: 10px; border-radius: 8px; margin-bottom: 10px; gap: 8px; flex-wrap: wrap;
  }
  .selected-bar.show { display: flex; }
  .selected-bar button { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }

  .settings-field { margin-bottom: 16px; }
  .settings-field label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="server-header">
    <div>
      <span class="status-dot" id="statusDot"></span>
      <h1 id="serverName" style="display:inline">Instance</h1>
    </div>
    <a class="link" href="dashboard.html">&larr; Dashboard</a>
  </div>
  <div class="server-sub" id="serverSub"></div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="console">Console</button>
    <button class="tab-btn" data-tab="files">Files</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </div>

  <!-- CONSOLE TAB -->
  <div class="tab-content active" id="tab-console">
    <div class="card">
      <div class="console" id="consoleOutput"></div>
      <div style="margin-top:10px">
        <button class="btn-primary" onclick="doAction('start')">Start</button>
        <button class="btn-secondary" onclick="doAction('restart')">Restart</button>
        <button class="btn-danger" onclick="doAction('stop')">Stop</button>
      </div>
    </div>
  </div>

  <!-- FILES TAB -->
  <div class="tab-content" id="tab-files">
    <div class="card">
      <div class="fm-toolbar">
        <button onclick="mkdirPrompt()">Buat Folder</button>
        <button onclick="newFilePrompt()">File Baru</button>
        <label>Upload File<input type="file" id="fileUpload"></label>
        <label>Upload &amp; Extract ZIP<input type="file" id="zipUpload" accept=".zip"></label>
        <button onclick="runNpmInstall()">Jalanin npm install</button>
      </div>

      <div class="breadcrumb" id="breadcrumb"></div>

      <div class="selected-bar" id="selectedBar">
        <span id="selectedCount" style="align-self:center; margin-right:8px;"></span>
        <button onclick="archiveSelected()" style="background:#388bfd; color:white;">Jadikan ZIP</button>
        <button onclick="deleteSelected()" style="background:#da3633; color:white;">Hapus</button>
        <button onclick="clearSelection()" style="background:#6e7681; color:white;">Batal</button>
      </div>

      <p id="fmMsg" class="error"></p>
      <div id="fileList">Memuat...</div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="tab-content" id="tab-settings">
    <div class="card">
      <h3>Ganti Nama &amp; Entry File</h3>
      <div class="settings-field">
        <label>Nama Instance</label>
        <input id="settingsName" />
      </div>
      <div class="settings-field">
        <label>Entry File (mis. index.js)</label>
        <input id="settingsEntry" />
      </div>
      <button class="btn-primary" onclick="saveSettings()">Simpan</button>
      <p id="settingsMsg" class="success"></p>
    </div>

    <div class="card">
      <h3>Hapus Instance</h3>
      <p style="color:#8b949e">Ini bakal hapus instance beserta semua filenya secara permanen. Gak bisa dibatalin.</p>
      <button class="btn-danger" onclick="deleteThisInstance()">Hapus Instance</button>
    </div>
  </div>
</div>
<script src="js/instance.js"></script>
</body>
</html>
